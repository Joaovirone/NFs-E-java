services:
   postgres:
    image: 'postgres:16-alpine'
    container_name: container_nfe_db
    environment:
      - 'POSTGRES_DB=${DB_NAME}'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD}'
      - 'POSTGRES_USER=${DB_USERNAME}'
    ports:
      - '${DB_PORT}:5432'

    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: '512M'

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
